name: Build Docker Image
on: workflow_dispatch

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        run: |
          REPO_LOWER="${{ github.repository }}"
          REPO_LOWER="${REPO_LOWER,,}"
          
          docker build \
            --build-arg YANDEX_CLIENT_ID=${{ secrets.YANDEX_CLIENT_ID }} \
            -t ghcr.io/${REPO_LOWER}:${{ github.sha }} \
            -f ./docker/Dockerfile.jvm \
            .
          docker push ghcr.io/${REPO_LOWER}:${{ github.sha }}

      - name: Tag latest
        if: github.ref == 'refs/heads/main'
        run: |
          REPO_LOWER="${{ github.repository }}"
          REPO_LOWER="${REPO_LOWER,,}"
          
          docker tag ghcr.io/${REPO_LOWER}:${{ github.sha }} \
            ghcr.io/${REPO_LOWER}:latest
          docker push ghcr.io/${REPO_LOWER}:latest